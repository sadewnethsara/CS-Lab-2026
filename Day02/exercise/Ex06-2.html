<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internal CSS Example</title>
    <style>
        /* Styles defined in the head section */
        h1 {
            color: blue;
            font-family: sans-serif;
        }
        p {
            color: red;
            font-family: sans-serif;
        }
    </style>
</head>
<body>

    <h1>A Blue Heading</h1>
    <p>A red paragraph.</p>

</body>
</html>
