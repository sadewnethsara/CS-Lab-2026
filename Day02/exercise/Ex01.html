<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table</title>
	<style>
		table,th,td{
			border:1px solid black;
			border-collapse: collapse;
		}
		table{
			width: 30%;
		}
	</style>
</head>
<body>
	<table>
		<caption>Student Details</caption>
		<tr>
			<th width="50%" >Name</th>
			<th>Stream</th>
			<th>GPA</th>
		</tr>
		<tr>
			<td>Mala</td>
			<td>Physical Sciences</td>
			<td>3.67</td>
		</tr>
		<tr>
			<td>Saminda</td>
			<td>Bio Sciences</td>
			<td>3.91</td>
		</tr>
		<tr>
			<td>Fathima</td>
			<td>Physical Sciences</td>
			<td>2.56</td>
		</tr>
	</table>
</body>
</html>
