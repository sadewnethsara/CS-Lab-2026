<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <style>
        /* Base styles and background */
        body {
            font-family: 'Times New Roman', Times, serif;
            background-color: #ffb6c1; /* Soft pink background */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        h2 {
            font-size: 28px;
            margin-bottom: 20px;
            color: #000000;
        }

        /* Form container box */
        .form-container {
            background-color: #a0e0e6; /* Light blue/teal background */
            padding: 30px 40px;
            width: 450px;
        }

        /* Form row layouts */
        .form-group {
            display: flex;
            align-items: flex-start;
            margin-bottom: 15px;
        }

        .form-group label {
            width: 130px;
            font-size: 18px;
            color: #000000;
            padding-top: 2px;
        }

        /* Input fields configuration */
        .form-group input[type="text"],
        .form-group input[type="email"],
        .form-group textarea {
            flex: 1;
            padding: 2px;
            font-size: 16px;
            border: 1px solid #767676;
            outline: none;
            box-sizing: border-box;
            background-color: #ffffff;
        }

        .form-group textarea {
            height: 100px;
            resize: both; 
        }

        /* Radio buttons and checkbox styling */
        .radio-group, .checkbox-group {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 18px;
        }

        .radio-group input, .checkbox-group input {
            margin: 0 3px 0 0;
        }

        .radio-container {
            display: flex;
            gap: 15px;
        }

        /* Button configurations */
        .button-group {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
            padding-left: 50px; 
        }

        .btn {
            padding: 6px 20px;
            font-size: 16px;
            color: white;
            border: none;
            border-radius: 2px;
        }

        .btn-send {
            background-color: #4caf50; /* Solid Green */
        }

        .btn-clear {
            background-color: #f44336; /* Solid Red */
        }
    </style>
</head>
<body>

    <h2>Contact Us</h2>

    <div class="form-container">
        <form action="#" method="POST">
            
            <div class="form-group">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name">
            </div>

            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email">
            </div>

            <div class="form-group">
                <label for="subject">Subject:</label>
                <input type="text" id="subject" name="subject">
            </div>

            <div class="form-group">
                <label for="message">Message:</label>
                <textarea id="message" name="message"></textarea>
            </div>

            <div class="form-group">
                <label>Contact Method:</label>
                <div class="radio-container">
                    <div class="radio-group">
                        <input type="radio" id="method-email" name="contact-method" value="email">
                        <label for="method-email">Email</label>
                    </div>
                    <div class="radio-group">
                        <input type="radio" id="method-phone" name="contact-method" value="phone">
                        <label for="method-phone">Phone</label>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label for="subscribe">Subscribe:</label>
                <div class="checkbox-group">
                    <input type="checkbox" id="subscribe" name="subscribe" value="yes">
                    <label for="subscribe">Yes</label>
                </div>
            </div>

            <div class="button-group">
                <button type="submit" class="btn btn-send">Send</button>
                <button type="reset" class="btn btn-clear">Clear</button>
            </div>

        </form>
    </div>

</body>
</html>
