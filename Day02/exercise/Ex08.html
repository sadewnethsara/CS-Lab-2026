<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 08</title>
    <style>
        /* Base page layout and font styling */
        body {
            font-family: 'Times New Roman', Times, serif;
            margin: 20px;
            background-color: #ffffff;
        }

        /* Container for each city section */
        .city-box {
            border: 2px solid #000000;
            padding: 25px;
            margin-bottom: 20px;
            color: #ffffff; /* White text for all boxes */
        }

        /* City heading configuration */
        .city-box h2 {
            margin: 0 0 15px 0;
            font-size: 24px;
            font-weight: bold;
        }

        /* City description configuration */
        .city-box p {
            margin: 0;
            font-size: 16px;
        }

        /* Specific background colors matching the screenshot */
        .london {
            background-color: #ff6347; /* Tomato red/coral color */
        }

        .paris {
            background-color: #0000ff; /* Solid blue color */
        }

        .tokyo {
            background-color: #008000; /* Solid green color */
        }
    </style>
</head>
<body>

    <div class="city-box london">
        <h2>London</h2>
        <p>London is the capital of the England</p>
    </div>

    <div class="city-box paris">
        <h2>Paris</h2>
        <p>Paris is the capital of the France</p>
    </div>

    <div class="city-box tokyo">
        <h2>Tokyo</h2>
        <p>Tokyo is the capital of the France</p>
    </div>

</body>
</html>
