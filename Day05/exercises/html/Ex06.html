<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Exercise 6 - Car List Loop</title>
</head>
<body>

    <h2>Available Car Names</h2>
    <ul id="car-list"></ul>

    <script>
        const cars = ["Toyota", "BMW", "MAZDA", "VOLVO"];
        let listHTML = "";

        for (let i = 0; i < cars.length; i++) {
            listHTML += "<li>" + cars[i] + "</li>";
        }

        document.getElementById("car-list").innerHTML = listHTML;
    </script>

</body>
</html>
